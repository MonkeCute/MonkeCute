<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Your Name</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    a {
      text-decoration: none;
      color: white;
      background: #3b82f6;
      padding: 10px 20px;
      border-radius: 8px;
      transition: 0.3s;
    }

    a:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Hello 👋</h1>
    <p>Welcome to my website</p>
    <a href="https://github.com/yourusername">My GitHub</a>
  </div>

</body>
</html>
